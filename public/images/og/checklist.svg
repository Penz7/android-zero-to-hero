<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="green-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dark-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111111;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#dark-gradient)" />
  
  <!-- Checklist icon -->
  <g transform="translate(500, 150)">
    <rect width="200" height="150" rx="10" fill="#22c55e" />
    <rect x="20" y="20" width="160" height="110" rx="5" fill="#0a0a0a" />
    <!-- Checklist items -->
    <rect x="40" y="40" width="20" height="20" rx="3" fill="#22c55e" />
    <rect x="70" y="45" width="80" height="10" rx="2" fill="#888888" />
    <rect x="40" y="70" width="20" height="20" rx="3" fill="#22c55e" />
    <rect x="70" y="75" width="80" height="10" rx="2" fill="#888888" />
    <rect x="40" y="100" width="20" height="20" rx="3" fill="#22c55e" />
    <rect x="70" y="105" width="80" height="10" rx="2" fill="#888888" />
  </g>
  
  <!-- Title -->
  <text x="600" y="380" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">
    Checklist hoàn thành
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="440" font-family="Arial, sans-serif" font-size="28" fill="#22c55e" text-anchor="middle">
    Theo dõi tiến độ học tập của bạn
  </text>
  
  <!-- Progress bar -->
  <g transform="translate(200, 480)">
    <rect width="800" height="40" rx="10" fill="#1a1a1a" stroke="#22c55e" stroke-width="2" />
    <rect x="10" y="10" width="400" height="20" rx="5" fill="#22c55e" />
    <text x="400" y="30" font-family="Arial, sans-serif" font-size="16" fill="#0a0a0a" text-anchor="middle">50%</text>
  </g>
  
  <!-- Stats -->
  <text x="400" y="550" font-family="Arial, sans-serif" font-size="24" fill="#888888" text-anchor="middle">
    15/30 bài học
  </text>
  <text x="800" y="550" font-family="Arial, sans-serif" font-size="24" fill="#888888" text-anchor="middle">
    2/4 dự án
  </text>
  
  <!-- Website branding -->
  <text x="600" y="600" font-family="Arial, sans-serif" font-size="24" fill="#666666" text-anchor="middle">
    Android Zero to Hero
  </text>
</svg>