<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="green-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dark-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111111;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#dark-gradient)" />
  
  <!-- Day badge -->
  <g transform="translate(500, 100)">
    <rect width="200" height="80" rx="10" fill="url(#green-gradient)" />
    <text x="100" y="50" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#0a0a0a" text-anchor="middle">
      Day X/30
    </text>
  </g>
  
  <!-- Title placeholder -->
  <text x="600" y="250" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">
    Bài học
  </text>
  
  <!-- Subtitle placeholder -->
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="28" fill="#22c55e" text-anchor="middle">
    Mô tả bài học
  </text>
  
  <!-- Week indicator -->
  <g transform="translate(450, 380)">
    <rect width="300" height="60" rx="10" fill="#1a1a1a" stroke="#22c55e" stroke-width="2" />
    <text x="150" y="38" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle">
      Tuần 1 - Kotlin
    </text>
  </g>
  
  <!-- Duration -->
  <text x="600" y="480" font-family="Arial, sans-serif" font-size="24" fill="#888888" text-anchor="middle">
    ⏱ 40 phút
  </text>
  
  <!-- Difficulty -->
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="24" fill="#888888" text-anchor="middle">
    ⭐ Beginner
  </text>
  
  <!-- Website branding -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="24" fill="#666666" text-anchor="middle">
    Android Zero to Hero
  </text>
</svg>