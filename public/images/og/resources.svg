<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="green-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dark-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111111;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#dark-gradient)" />
  
  <!-- Book icon -->
  <g transform="translate(500, 150)">
    <rect width="200" height="150" rx="10" fill="#22c55e" />
    <rect x="20" y="20" width="160" height="110" rx="5" fill="#0a0a0a" />
    <text x="100" y="80" font-family="Arial, sans-serif" font-size="48" fill="#22c55e" text-anchor="middle">📚</text>
  </g>
  
  <!-- Title -->
  <text x="600" y="380" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">
    Tài liệu học tập
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="440" font-family="Arial, sans-serif" font-size="28" fill="#22c55e" text-anchor="middle">
    Official docs, tutorials, tools
  </text>
  
  <!-- Resource categories -->
  <g transform="translate(200, 480)">
    <rect width="800" height="60" rx="10" fill="#1a1a1a" stroke="#22c55e" stroke-width="2" />
    <text x="100" y="38" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle">Android Docs</text>
    <text x="300" y="38" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle">Kotlin Docs</text>
    <text x="500" y="38" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle">Compose Docs</text>
    <text x="700" y="38" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle">Tools</text>
  </g>
  
  <!-- Website branding -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="24" fill="#666666" text-anchor="middle">
    Android Zero to Hero
  </text>
</svg>