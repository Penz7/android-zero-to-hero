<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="green-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dark-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111111;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#dark-gradient)" />
  
  <!-- Title -->
  <text x="600" y="80" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">
    Lộ trình 30 ngày
  </text>
  <text x="600" y="130" font-family="Arial, sans-serif" font-size="28" fill="#22c55e" text-anchor="middle">
    Android Development Roadmap
  </text>
  
  <!-- Week 1 -->
  <g transform="translate(100, 200)">
    <rect width="200" height="250" rx="15" fill="#1a1a1a" stroke="#22c55e" stroke-width="2" />
    <rect x="20" y="20" width="160" height="80" rx="10" fill="#22c55e" />
    <text x="100" y="70" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0a0a0a" text-anchor="middle">
      Tuần 1
    </text>
    <text x="100" y="130" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle">
      Kotlin
    </text>
    <text x="100" y="160" font-family="Arial, sans-serif" font-size="16" fill="#888888" text-anchor="middle">
      Nền tảng ngôn ngữ
    </text>
    <text x="100" y="200" font-family="Arial, sans-serif" font-size="14" fill="#22c55e" text-anchor="middle">
      7 bài học
    </text>
  </g>
  
  <!-- Week 2 -->
  <g transform="translate(350, 200)">
    <rect width="200" height="250" rx="15" fill="#1a1a1a" stroke="#22c55e" stroke-width="2" />
    <rect x="20" y="20" width="160" height="80" rx="10" fill="#22c55e" />
    <text x="100" y="70" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0a0a0a" text-anchor="middle">
      Tuần 2
    </text>
    <text x="100" y="130" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle">
      Compose
    </text>
    <text x="100" y="160" font-family="Arial, sans-serif" font-size="16" fill="#888888" text-anchor="middle">
      UI hiện đại
    </text>
    <text x="100" y="200" font-family="Arial, sans-serif" font-size="14" fill="#22c55e" text-anchor="middle">
      7 bài học
    </text>
  </g>
  
  <!-- Week 3 -->
  <g transform="translate(600, 200)">
    <rect width="200" height="250" rx="15" fill="#1a1a1a" stroke="#22c55e" stroke-width="2" />
    <rect x="20" y="20" width="160" height="80" rx="10" fill="#22c55e" />
    <text x="100" y="70" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0a0a0a" text-anchor="middle">
      Tuần 3
    </text>
    <text x="100" y="130" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle">
      Architecture
    </text>
    <text x="100" y="160" font-family="Arial, sans-serif" font-size="16" fill="#888888" text-anchor="middle">
      Xây dựng chuyên nghiệp
    </text>
    <text x="100" y="200" font-family="Arial, sans-serif" font-size="14" fill="#22c55e" text-anchor="middle">
      7 bài học
    </text>
  </g>
  
  <!-- Week 4 -->
  <g transform="translate(850, 200)">
    <rect width="200" height="250" rx="15" fill="#1a1a1a" stroke="#22c55e" stroke-width="2" />
    <rect x="20" y="20" width="160" height="80" rx="10" fill="#22c55e" />
    <text x="100" y="70" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0a0a0a" text-anchor="middle">
      Tuần 4
    </text>
    <text x="100" y="130" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle">
      Engineering
    </text>
    <text x="100" y="160" font-family="Arial, sans-serif" font-size="16" fill="#888888" text-anchor="middle">
      Kỹ năng Engineer
    </text>
    <text x="100" y="200" font-family="Arial, sans-serif" font-size="14" fill="#22c55e" text-anchor="middle">
      9 bài học
    </text>
  </g>
  
  <!-- Footer -->
  <text x="600" y="550" font-family="Arial, sans-serif" font-size="24" fill="#666666" text-anchor="middle">
    Android Zero to Hero
  </text>
</svg>