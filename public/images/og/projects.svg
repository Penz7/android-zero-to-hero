    <text x="125" y="170" font-family="Arial, sans-serif" font-size="14" fill="#22c55e" text-anchor="middle">
      🟢 Beginner
    </text>
  </g>
  
  <!-- Project 2 -->
  <g transform="translate(375, 200)">
