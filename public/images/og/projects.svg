    <rect x="20" y="20" width="60" height="60" rx="10" fill="#22c55e" />
    <text x="50" y="55" font-family="Arial, sans-serif" font-size="24" fill="#0a0a0a" text-anchor="middle">📝</text>
    <text x="125" y="110" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">
