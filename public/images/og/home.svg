<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="green-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dark-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111111;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#dark-gradient)" />
  
  <!-- Decorative green circles -->
  <circle cx="100" cy="100" r="200" fill="url(#green-gradient)" opacity="0.1" />
  <circle cx="1100" cy="530" r="150" fill="url(#green-gradient)" opacity="0.1" />
  
  <!-- Android robot icon (simplified) -->
  <g transform="translate(150, 200)">
    <!-- Head -->
    <rect x="0" y="0" width="120" height="80" rx="20" fill="#22c55e" />
    <!-- Antenna -->
    <rect x="55" y="-20" width="10" height="20" fill="#22c55e" />
    <circle cx="60" cy="-25" r="5" fill="#22c55e" />
    <!-- Eyes -->
    <circle cx="35" cy="30" r="8" fill="#0a0a0a" />
    <circle cx="85" cy="30" r="8" fill="#0a0a0a" />
    <!-- Body -->
    <rect x="10" y="80" width="100" height="120" rx="15" fill="#22c55e" />
    <!-- Arms -->
    <rect x="-20" y="90" width="30" height="80" rx="10" fill="#22c55e" />
    <rect x="110" y="90" width="30" height="80" rx="10" fill="#22c55e" />
    <!-- Legs -->
    <rect x="20" y="200" width="30" height="60" rx="10" fill="#22c55e" />
    <rect x="70" y="200" width="30" height="60" rx="10" fill="#22c55e" />
  </g>
  
  <!-- Main title -->
  <text x="600" y="250" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle">
    Android Zero to Hero
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="32" fill="#22c55e" text-anchor="middle">
    Lộ trình 30 ngày với Kotlin & Jetpack Compose
  </text>
  
  <!-- Day badge -->
  <rect x="500" y="380" width="200" height="60" rx="10" fill="url(#green-gradient)" />
  <text x="600" y="420" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0a0a0a" text-anchor="middle">
    Từ số 0 đến Junior
  </text>
  
  <!-- Website URL -->
  <text x="600" y="550" font-family="Arial, sans-serif" font-size="24" fill="#666666" text-anchor="middle">
    android-zero-to-hero.github.io
  </text>
</svg>